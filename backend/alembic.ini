# Alembic configuration file for learning-platform backend.

[alembic]
# path to migration scripts
script_location = alembic

# sys.path prepends for the env.py module
prepend_sys_path = .

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# as well as the filename. If specified as "EST5EDT" for example, will
# use that timezone. If omitted, will default to UTC.
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command
# regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .hierarchical versioning
# version_path_separator = os  # Use os.pathsep.

# sqlalchemy.url is overridden in env.py from app.config.settings
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/learning_platform

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
